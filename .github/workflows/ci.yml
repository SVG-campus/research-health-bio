name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package + dev deps
        run: pip install -U pip && pip install ".[dev]"
      - name: Pytest
        run: pytest -q
      - name: Execute CI notebooks (yaml list)
        run: python scripts/ci_execute_smoke_nb.py
      - name: Upload notebooks and run config on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-failure-${{ github.run_id }}-${{ github.job }}
          if-no-files-found: ignore
          path: |
            notebooks/
            runs/
            scripts/ci_execute_smoke_nb.py
