version: 1
pillar: research-health-bio
title: "Health & bio signals"
streaming_preferred: true

huggingface:
  - repo_id: nyu-mml/glue
    config: cola
    split: train[:2%]
    streaming: true
    note: Tiny GLUE stream for CI / dataloader sanity — replace with domain datasets as charters land.
  - repo_id: dair-ai/emotion
    split: train[:2%]
    streaming: true
    note: >
      Pinned for `CHARTER_EMOTION_STREAM_SMOKE` CI + pytest stream smoke — text emotion labels as a
      dataloader/stream proxy only; not diagnostics, not a clinical dataset, and not a substitute for
      IRB-governed health records when the charter demands measured biology.

kaggle: []


search_keywords: []

reference_streams:
  - name: PubMed search (reference)
    url: https://pubmed.ncbi.nlm.nih.gov/
    note: Literature pointers only — full text licensing varies by publisher.

